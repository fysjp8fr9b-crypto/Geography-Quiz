<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO Quiz – 1. Jahrgang (GWB)</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449;
    --accent:#38bdf8; --accent2:#0ea5e9;
    --good:#22c55e; --bad:#ef4444; --warn:#f59e0b;
    --text:#e2e8f0; --muted:#94a3b8; --border:#334155;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(160deg,#0f172a,#13233f); color:var(--text);
    min-height:100vh; padding:24px;
  }
  .wrap{max-width:760px; margin:0 auto}
  header{text-align:center; margin-bottom:24px}
  header h1{margin:0 0 6px; font-size:1.9rem}
  header p{margin:0; color:var(--muted)}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.3); margin-bottom:18px;
  }
  h2{margin:0 0 14px; font-size:1.25rem}
  .topics{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px}
  @media(max-width:560px){.topics{grid-template-columns:1fr}}
  .topic{
    display:flex; align-items:center; gap:10px; background:var(--card2);
    border:1px solid var(--border); border-radius:10px; padding:10px 12px; cursor:pointer;
    font-size:.95rem; user-select:none; transition:.15s;
  }
  .topic:hover{border-color:var(--accent)}
  .topic input{width:18px; height:18px; accent-color:var(--accent)}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .opt-toggle{display:flex; gap:18px; margin:6px 0 18px; color:var(--muted); flex-wrap:wrap}
  .opt-toggle label{display:flex; gap:8px; align-items:center; cursor:pointer}
  button{
    background:var(--accent2); color:#04293f; border:none; border-radius:10px;
    padding:12px 22px; font-size:1rem; font-weight:600; cursor:pointer; transition:.15s;
  }
  button:hover{background:var(--accent)}
  button.ghost{background:transparent; color:var(--accent); border:1px solid var(--accent)}
  button.ghost:hover{background:rgba(56,189,248,.1)}
  button:disabled{opacity:.45; cursor:not-allowed}
  .meta{display:flex; justify-content:space-between; color:var(--muted); font-size:.9rem; margin-bottom:10px}
  .progress{height:8px; background:var(--card2); border-radius:99px; overflow:hidden; margin-bottom:18px}
  .progress > div{height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); width:0; transition:width .3s}
  .qtext{font-size:1.15rem; line-height:1.5; margin-bottom:6px}
  .tag{display:inline-block; font-size:.72rem; letter-spacing:.04em; text-transform:uppercase;
    color:var(--accent); background:rgba(56,189,248,.12); padding:3px 9px; border-radius:99px; margin-bottom:12px}
  .answers{display:flex; flex-direction:column; gap:10px; margin:16px 0}
  .answer{
    text-align:left; background:var(--card2); border:1px solid var(--border); color:var(--text);
    padding:13px 16px; border-radius:10px; font-size:1rem; cursor:pointer; transition:.12s; font-weight:400;
  }
  .answer:hover:not(:disabled){border-color:var(--accent)}
  .answer.correct{border-color:var(--good); background:rgba(34,197,94,.15)}
  .answer.wrong{border-color:var(--bad); background:rgba(239,68,68,.15)}
  .answer.disabled{cursor:default}
  input.text-ans{
    width:100%; padding:13px 16px; border-radius:10px; border:1px solid var(--border);
    background:var(--card2); color:var(--text); font-size:1rem;
  }
  input.text-ans:focus{outline:none; border-color:var(--accent)}
  .feedback{margin-top:14px; padding:13px 16px; border-radius:10px; font-size:.95rem; line-height:1.5; display:none}
  .feedback.show{display:block}
  .feedback.ok{background:rgba(34,197,94,.12); border:1px solid var(--good)}
  .feedback.no{background:rgba(239,68,68,.12); border:1px solid var(--bad)}
  .feedback b{color:var(--accent)}
  .nav{display:flex; justify-content:space-between; margin-top:18px}
  .score-big{font-size:3rem; font-weight:700; text-align:center; margin:10px 0}
  .score-sub{text-align:center; color:var(--muted); margin-bottom:18px}
  .breakdown{margin:18px 0}
  .breakdown div{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border)}
  .center{text-align:center}
  .hidden{display:none}
  .pill{font-size:.8rem; color:var(--muted)}
  small.hint{color:var(--muted); display:block; margin-top:8px}
  table.board{width:100%; border-collapse:collapse; margin:14px 0}
  table.board td{padding:10px 12px; border-bottom:1px solid var(--border)}
  table.board tr.me{background:rgba(56,189,248,.12)}
  table.board .rank{width:44px; color:var(--muted); font-weight:700; text-align:center}
  table.board .pts{text-align:right; font-weight:700; color:var(--accent); white-space:nowrap}
  table.board .medal{font-size:1.1rem}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🌍 GEO Quiz – 1. Jahrgang</h1>
    <p>Geografie & Wirtschaftskunde · GWB · Übung zum Schulstoff</p>
  </header>

  <!-- START -->
  <div id="start" class="card">
    <h2>Dein Name</h2>
    <input type="text" id="playerName" class="text-ans" maxlength="24"
           placeholder="Name eingeben (z. B. Max M.) …" autocomplete="off" style="margin-bottom:20px">
    <h2>Themen wählen</h2>
    <div class="topics" id="topicList"></div>
    <div class="opt-toggle">
      <label><input type="checkbox" id="shuffleQ" checked> Fragen mischen</label>
      <label><input type="checkbox" id="limit15"> Nur 15 Fragen (Schnellrunde)</label>
    </div>
    <div class="row">
      <button id="startBtn">Quiz starten</button>
      <button class="ghost" id="allBtn">Alle Themen</button>
      <span class="pill" id="countInfo"></span>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="card hidden">
    <div class="meta">
      <span id="qCounter"></span>
      <span id="qTopic"></span>
    </div>
    <div class="progress"><div id="bar"></div></div>
    <span class="tag" id="qTag"></span>
    <div class="qtext" id="qText"></div>
    <div id="answerArea"></div>
    <div class="feedback" id="feedback"></div>
    <div class="nav">
      <button class="ghost" id="quitBtn">Abbrechen</button>
      <button id="nextBtn" disabled>Weiter</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="card hidden">
    <h2 class="center">Ergebnis</h2>
    <div class="score-big" id="scoreBig"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="breakdown" id="breakdown"></div>

    <h2 class="center" style="margin-top:24px">🏆 Rangliste – <span id="monthLabel"></span></h2>
    <p class="center pill" id="boardNote">Punkte: 1 pro richtiger Antwort · setzt sich jeden Monat zurück</p>
    <table class="board" id="board"><tbody></tbody></table>
    <p class="center pill" id="boardStatus"></p>

    <div class="center">
      <button id="retryBtn">Nochmal</button>
      <button class="ghost" id="homeBtn">Zur Themenauswahl</button>
    </div>
  </div>

  <p class="center pill">Lernhilfe – Inhalte basieren auf dem Skript „1. Klasse GEO“. Klimawandel-Themen sind ausgenommen.</p>
</div>

<script>
/* ====== FRAGEN ======
   type "mc"   -> options[], answer = Index der richtigen Option
   type "text" -> accept[] = akzeptierte Antworten (lowercase, Vergleich tolerant)
*/
const QUESTIONS = [
  // 1. GRUNDLAGEN DER GEOGRAFIE
  {topic:"Grundlagen", type:"mc",
    q:"Wie viele „Sphären“ der Erde werden im Skript genannt?",
    options:["3","4","5","6"], answer:2,
    fb:"Fünf Sphären: Magnetosphäre, Biosphäre, Atmosphäre, Hydrosphäre, Lithosphäre."},
  {topic:"Grundlagen", type:"mc",
    q:"Welche Sphäre umfasst die Gesamtheit des Wassers auf der Erde?",
    options:["Atmosphäre","Hydrosphäre","Lithosphäre","Biosphäre"], answer:1,
    fb:"Die Hydrosphäre – ca. 97 % Salzwasser, 3 % Süßwasser."},
  {topic:"Grundlagen", type:"text",
    q:"Wie nennt man die äußere Gesteinsschicht der Erdkruste (10–100 km dick)?",
    accept:["lithosphäre","lithosphaere"],
    fb:"Lithosphäre – die feste Gesteins- bzw. Erdkruste."},
  {topic:"Grundlagen", type:"mc",
    q:"Warum gibt es auf der Erde Jahreszeiten?",
    options:["Weil sich der Abstand Erde–Sonne stark ändert",
             "Wegen der 23,5°-Neigung der Erdachse und unterschiedlichem Einfallswinkel der Sonnenstrahlen",
             "Weil sich die Sonne um die Erde dreht",
             "Wegen der Erdrotation in 24 Stunden"], answer:1,
    fb:"Die 23,5°-Neigung der Erdachse sorgt für unterschiedliche Einfallswinkel – je flacher, desto kälter."},
  {topic:"Grundlagen", type:"text",
    q:"Wie lange dauert eine Erdrotation (Drehung um die eigene Achse)? (in Stunden)",
    accept:["24","24 stunden","24h"],
    fb:"24 Stunden = eine Erdrotation."},

  // 2. KARTEN & ORIENTIERUNG
  {topic:"Karten & Orientierung", type:"mc",
    q:"Was bedeutet ein Maßstab von 1 : 100 000?",
    options:["1 cm auf der Karte = 100 m in der Natur",
             "1 cm auf der Karte = 1 km in der Natur",
             "1 cm auf der Karte = 10 km in der Natur",
             "1 m auf der Karte = 100 km in der Natur"], answer:1,
    fb:"1 cm = 100 000 cm = 1 km in der Natur."},
  {topic:"Karten & Orientierung", type:"mc",
    q:"Welche Karte dient speziell der Orientierung und zeigt das Gelände (physische Karte)?",
    options:["Thematische Karte","Topografische Karte","Wirtschaftskarte","Klimakarte"], answer:1,
    fb:"Topografische Karten dienen der Orientierung; thematische Karten machen spezielle Aussagen."},
  {topic:"Karten & Orientierung", type:"text",
    q:"Welchen Breitengrad hat der Äquator? (Zahl)",
    accept:["0","0°","0 grad","null"],
    fb:"Der Äquator hat den Breitengrad 0°."},
  {topic:"Karten & Orientierung", type:"mc",
    q:"Durch welchen Ort verläuft der Nullmeridian?",
    options:["Paris","Greenwich","Rom","Wien"], answer:1,
    fb:"Der Nullmeridian verläuft durch die Sternwarte von Greenwich (London)."},
  {topic:"Karten & Orientierung", type:"mc",
    q:"Was ist KEIN Merkmal einer geografischen Karte?",
    options:["Sie ist verkleinert","Sie ist verebnet","Sie ist generalisiert","Sie ist immer dreidimensional"], answer:3,
    fb:"Karten sind meist zweidimensional – nur Reliefkarten sind dreidimensional."},
  {topic:"Karten & Orientierung", type:"mc",
    q:"Welche Aussage zu GPS stimmt?",
    options:["GPS funktioniert nur bei Nacht",
             "GPS wird ausschließlich vom Militär genutzt",
             "GPS ist ein satellitengestütztes Navigationssystem und kann die Position bis auf wenige Meter genau bestimmen",
             "GPS kann nur in Europa genutzt werden"], answer:2,
    fb:"GPS ist satellitengestützt und metergenau; GALILEO ist das europäische Pendant."},

  // 3. PLATTENTEKTONIK
  {topic:"Plattentektonik", type:"mc",
    q:"Worauf „treiben“ die tektonischen Platten?",
    options:["Auf der Asthenosphäre","Auf dem Erdkern","Auf der Atmosphäre","Auf dem Grundwasser"], answer:0,
    fb:"Die Platten treiben auf der zähflüssigen Asthenosphäre (Konvektionsströme im Erdmantel)."},
  {topic:"Plattentektonik", type:"text",
    q:"Wie heißen die Strömungen im Erdmantel, die die Plattenbewegung antreiben? (Fachbegriff)",
    accept:["konvektionsströme","konvektionsstrome","konvektionsstroeme","konvektion","konvektionsstrom"],
    fb:"Konvektionsströme im Erdmantel – der „Förderband-Effekt“."},
  {topic:"Plattentektonik", type:"mc",
    q:"Was passiert an einer Subduktionszone?",
    options:["Zwei Platten driften auseinander",
             "Zwei Platten schrammen aneinander vorbei",
             "Eine Platte schiebt sich unter die andere",
             "Zwei Platten stehen still"], answer:2,
    fb:"Bei der Subduktion schiebt sich eine (ozeanische) Platte unter die andere."},
  {topic:"Plattentektonik", type:"mc",
    q:"Welche Plattengrenze beschreibt „zwei Platten treiben auseinander“?",
    options:["Konvergierend","Divergierend","Transformzone","Subduktion"], answer:1,
    fb:"Divergierende Plattengrenzen: Platten driften auseinander (z. B. Mittelozeanische Rücken)."},
  {topic:"Plattentektonik", type:"mc",
    q:"Welche Kruste ist dicker und leichter?",
    options:["Ozeanische Kruste (Basalt)","Kontinentale Kruste (Granit)","Beide gleich","Die Asthenosphäre"], answer:1,
    fb:"Kontinentale Kruste (~30–70 km, Granit) ist dicker und leichter als ozeanische (~6 km, Basalt)."},

  // 4. VULKANISMUS & ERDBEBEN
  {topic:"Vulkane & Erdbeben", type:"mc",
    q:"Welcher Vulkantyp ist flach, breit und seine Lava fließt ruhig ab?",
    options:["Schichtvulkan / Stratovulkan","Schildvulkan","Aschevulkan","Caldera"], answer:1,
    fb:"Der Schildvulkan ist flach und breit mit ruhig fließender Lava."},
  {topic:"Vulkane & Erdbeben", type:"text",
    q:"Wie nennt man den Punkt im Erdinneren, an dem ein Erdbeben entsteht?",
    accept:["hypozentrum","hypozentrums"],
    fb:"Das Hypozentrum ist der Ort der Entladung im Erdinneren; das Epizentrum liegt darüber an der Oberfläche."},
  {topic:"Vulkane & Erdbeben", type:"mc",
    q:"Welche Aussage zur Richterskala stimmt?",
    options:["Sie ist nach oben begrenzt",
             "Bei jedem Skalenwert nimmt die Stärke um das 10-fache zu",
             "Beben der Stärke 9,5 treten häufig auf",
             "Sie misst nur die Dauer eines Bebens"], answer:1,
    fb:"Pro ganzer Stufe steigt die Stärke um das 10-fache; die Skala ist nach oben offen."},
  {topic:"Vulkane & Erdbeben", type:"mc",
    q:"Welche seismischen Wellen richten Schäden an (Oberflächenwellen)?",
    options:["P- und S-Wellen","Love- und Rayleigh-Wellen","Radiowellen","Schallwellen"], answer:1,
    fb:"Love- und Rayleigh-Wellen sind die schadensverursachenden Oberflächenwellen."},
  {topic:"Vulkane & Erdbeben", type:"mc",
    q:"Der Ausbruch des Vulkans Tambora (1815) führte 1816 zu welchem Phänomen?",
    options:["Einem extrem heißen Sommer",
             "Dem „Jahr ohne Sommer“ mit Kälte, Ernteausfällen und Hunger",
             "Einer langen Dürre in Asien",
             "Einem Anstieg des Meeresspiegels"], answer:1,
    fb:"Schwefelaerosole kühlten das Klima ab (~3 °C in DE) → „Jahr ohne Sommer“ 1816, Hungersnot, Auswanderung."},

  // 5. GEBIRGE / ENDOGEN & EXOGEN
  {topic:"Gebirge & Kräfte", type:"mc",
    q:"Was sind exogene Kräfte?",
    options:["Kräfte aus dem Erdinneren (Vulkanismus, Erdbeben)",
             "Kräfte, die von außen wirken (Wind, Wasser, Eis)",
             "Kräfte des Erdmagnetfeldes",
             "Kräfte der Erdrotation"], answer:1,
    fb:"Exogene Kräfte wirken von außen (Wind, Wasser, Eis) – die „Zerstörer“ der Erdoberfläche."},
  {topic:"Gebirge & Kräfte", type:"text",
    q:"Wie nennt man die Abtragung und den Transport von Gesteinsmaterial durch Wasser, Eis oder Wind?",
    accept:["erosion"],
    fb:"Erosion = Abtragung und Transport; Akkumulation = die anschließende Ablagerung."},
  {topic:"Gebirge & Kräfte", type:"mc",
    q:"Wodurch entstehen junge Hochgebirge wie die Alpen?",
    options:["Durch Verwitterung","Durch Kollision/Zusammenstoß von Erdplatten (konvergierend)",
             "Durch Gletscherschmelze","Durch Vulkanausbrüche allein"], answer:1,
    fb:"Beim Zusammenstoß von Platten wird die Kruste gefaltet und aufgetürmt → Faltengebirge."},
  {topic:"Gebirge & Kräfte", type:"mc",
    q:"Welche Landschaftsform hinterlassen Gletscher typischerweise?",
    options:["Canyon","U-Tal (Trogtal)","Düne","Vulkankrater"], answer:1,
    fb:"Gletscher formen U-Täler (Trogtäler) und hinterlassen Moränen und Seen."},

  // 6. KLIMAZONEN & VEGETATION (kein Klimawandel)
  {topic:"Klimazonen", type:"mc",
    q:"Welche Klimazone liegt rund um den Äquator?",
    options:["Polarzone","Gemäßigte Zone","Tropische Zone","Subtropische Zone"], answer:2,
    fb:"Rund um den Äquator liegt die tropische Zone (feucht-warm)."},
  {topic:"Klimazonen", type:"mc",
    q:"Welche Klimazone kommt in Europa am häufigsten vor?",
    options:["Tropische Zone","Gemäßigte Zone","Polarzone","Subtropische Zone"], answer:1,
    fb:"In Europa überwiegt die gemäßigte Zone mit vier Jahreszeiten."},
  {topic:"Klimazonen", type:"mc",
    q:"Warum ist der Boden im tropischen Regenwald oft nährstoffarm?",
    options:["Weil es zu kalt ist",
             "Weil Nährstoffe schnell aufgenommen und durch Regen ausgewaschen werden",
             "Weil es kaum Pflanzen gibt",
             "Weil der Boden gefroren ist"], answer:1,
    fb:"Trotz dichter Vegetation: Nährstoffe sind in der Biomasse gebunden und werden rasch ausgewaschen."},
  {topic:"Klimazonen", type:"mc",
    q:"Typische Produkte der subtropischen Zone (Mittelmeer) sind …",
    options:["Zitrusfrüchte, Oliven, Wein","Kaffee, Kakao, Bananen","Weizen und Kartoffeln","Rentierzucht und Fischerei"], answer:0,
    fb:"Subtropisch: warme Sommer, milde Winter → Zitrusfrüchte, Oliven, Wein."},

  // 7. ÖKOSYSTEM WÜSTE
  {topic:"Wüste", type:"text",
    q:"Wie nennt man die Eigenschaft, dass die Verdunstung höher ist als der Niederschlag (Trockenheit)?",
    accept:["aridität","ariditaet","aridität.","arid"],
    fb:"Aridität: Verdunstungsrate > Niederschlagsrate – das Gebiet ist sehr trocken."},
  {topic:"Wüste", type:"mc",
    q:"Was bedeutet Desertifikation?",
    options:["Bewässerung von Wüsten",
             "Ausbreitung/Neubildung von Wüsten durch Übernutzung des Raumes",
             "Abkühlung der Wüste in der Nacht",
             "Bildung von Salzseen"], answer:1,
    fb:"Desertifikation = Ausbreitung der Wüste, oft durch Überweidung, Abholzung und hohen Wasserverbrauch."},
  {topic:"Wüste", type:"mc",
    q:"Warum sind die Temperaturschwankungen in der Wüste so groß?",
    options:["Wegen häufiger Wolken","Wegen fehlender Wolken und geringer Luftfeuchtigkeit",
             "Wegen vieler Pflanzen","Wegen des hohen Grundwasserspiegels"], answer:1,
    fb:"Ohne Wolken entweicht nachts die Wärme ungehindert; trockene Luft speichert wenig Wärme."},

  // 8. WELTBEVÖLKERUNG
  {topic:"Weltbevölkerung", type:"mc",
    q:"In welchen zwei Großräumen leben besonders viele Menschen?",
    options:["Süd- und Ostasien","Antarktis und Sahara","Australien und Grönland","Amazonas und Sibirien"], answer:0,
    fb:"Süd- und Ostasien sind sehr dicht besiedelt; Wüsten und Polargebiete dünn."},
  {topic:"Weltbevölkerung", type:"text",
    q:"Ab wie vielen Einwohner:innen spricht man von einer Megastadt? (in Millionen)",
    accept:["10","10 millionen","10 mio","10mio","zehn"],
    fb:"Ab 10 Millionen Einwohner:innen spricht man von einer Megastadt."},
  {topic:"Weltbevölkerung", type:"mc",
    q:"Was ist ein Push-Faktor (Landflucht)?",
    options:["Vielfältige Arbeitsmöglichkeiten in der Stadt",
             "Geringes Einkommen und wenig Arbeit auf dem Land",
             "Großes Bildungsangebot in der Stadt",
             "Attraktiver Wohnungsmarkt"], answer:1,
    fb:"Push-Faktoren stoßen vom Land ab (wenig Arbeit, kaum Infrastruktur); Pull-Faktoren ziehen in die Stadt."},
  {topic:"Weltbevölkerung", type:"mc",
    q:"Was beschreibt der Begriff „Agglomeration“?",
    options:["Das Zentrum einer Stadt",
             "Ein zusammengewachsener Großraum aus Kernstadt, Vorstädten und Umland",
             "Ein Armutsviertel ohne Infrastruktur",
             "Ein einzelnes Hochhaus"], answer:1,
    fb:"Agglomeration = zusammengewachsener Ballungsraum; Slum = Armutsviertel; Kernstadt = Zentrum."},

  // 9. MIGRATION
  {topic:"Migration", type:"mc",
    q:"Was bedeutet „Migration“ ganz allgemein?",
    options:["Die Geburtenrate eines Landes",
             "Die Bewegung von Menschen von einem Ort an einen anderen",
             "Das Wachstum von Städten",
             "Der Handel zwischen Ländern"], answer:1,
    fb:"Migration = Bewegung von Menschen von einem Ort an einen anderen (dauerhaft, vorübergehend, saisonal oder täglich)."},
  {topic:"Migration", type:"mc",
    q:"Was beschreibt der Begriff „Emigration“?",
    options:["Das Einwandern in ein Land",
             "Das Auswandern aus einem Land, um dauerhaft in einem anderen zu leben",
             "Den Umzug vom Land in die Stadt",
             "Das tägliche Pendeln zur Arbeit"], answer:1,
    fb:"Emigration = Auswanderung. Immigration dagegen ist die Ein-/Zuwanderung in ein Land."},
  {topic:"Migration", type:"text",
    q:"Wie nennt man die Wanderung vom Land in die Stadt auf Deutsch? (ein Wort)",
    accept:["landflucht"],
    fb:"Landflucht (engl. rural-urban migration) – die Wanderung vom Land in die Stadt."},
  {topic:"Migration", type:"mc",
    q:"Welches ist ein Beispiel für unfreiwillige (erzwungene) Migration?",
    options:["Umzug für einen besser bezahlten Job",
             "Auslandsstudium über ein Erasmus-Programm",
             "Flucht vor Krieg oder politischer Verfolgung",
             "Umzug zu Freunden oder Verwandten"], answer:2,
    fb:"Unfreiwillige Migration entsteht z. B. durch Krieg, Verfolgung oder Naturkatastrophen. Job- oder Studienumzüge sind freiwillig."},
  {topic:"Migration", type:"mc",
    q:"Welcher der folgenden ist ein Push-Faktor (Grund, eine Region zu verlassen)?",
    options:["Bessere Bildung und Gesundheitsversorgung",
             "Höheres Lohnniveau",
             "Mehr Sicherheit",
             "Armut und Nahrungsmangel/Hungersnot"], answer:3,
    fb:"Push-Faktoren stoßen ab (Armut, Hunger, Krieg, Naturkatastrophen). Bessere Löhne, Bildung und Sicherheit sind Pull-Faktoren."},
  {topic:"Migration", type:"mc",
    q:"Was bedeutet „Brain Drain“?",

   auf diesem Gerät (zum Ausprobieren). Sobald beide Werte gesetzt
   sind, ist die Rangliste online für alle Geräte gemeinsam.

const SUPABASE_URL = "https://ulsfwcaglkyxcuzaotof.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsc2Z3Y2FnbGt5eGN1emFvdG9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODIyMjUsImV4cCI6MjA5NzU1ODIyNX0.7zWcfgpMMPYBT-JhlIz28C0ym844dFDgQkOXf9UX7ew";

const ONLINE = SUPABASE_URL.startsWith("http") && SUPABASE_KEY.length > 20;
const monthKey = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); };
const monthName = () => new Date().toLocaleDateString("de-AT",{month:"long",year:"numeric"});

// Score in die Online-Rangliste schreiben
async function submitScore(name, points){
  const row = { name: name, points: points, month_key: monthKey() };
  if(!ONLINE){ // lokaler Fallback
    const k="geoquiz_board_"+monthKey();
    const list=JSON.parse(localStorage.getItem(k)||"[]");
    list.push(row); localStorage.setItem(k,JSON.stringify(list));
    return;
  }
  await fetch(SUPABASE_URL+"/rest/v1/scores", {
    method:"POST",
    headers:{ "apikey":SUPABASE_KEY, "Authorization":"Bearer "+SUPABASE_KEY,
              "Content-Type":"application/json", "Prefer":"return=minimal" },
    body: JSON.stringify(row)
  });
}

// Rangliste des aktuellen Monats laden
async function loadBoard(){
  if(!ONLINE){
    const k="geoquiz_board_"+monthKey();
    return JSON.parse(localStorage.getItem(k)||"[]");
  }
  const url=SUPABASE_URL+"/rest/v1/scores?month_key=eq."+monthKey()+"&select=name,points&order=points.desc&limit=500";
  const r=await fetch(url,{ headers:{ "apikey":SUPABASE_KEY, "Authorization":"Bearer "+SUPABASE_KEY } });
  if(!r.ok) throw new Error("HTTP "+r.status);
  return await r.json();
}

/* ====== APP-LOGIK ====== */
const topics = [...new Set(QUESTIONS.map(q=>q.topic))];
const el = id => document.getElementById(id);
let pool=[], idx=0, score=0, perTopic={}, answered=false, playerName="";

// Themenliste rendern
const topicList = el('topicList');
topics.forEach(t=>{
  const c = QUESTIONS.filter(q=>q.topic===t).length;
  const label = document.createElement('label');
  label.className='topic';
  label.innerHTML = `<input type="checkbox" value="${t}" checked> <span>${t} <span class="pill">(${c})</span></span>`;
  topicList.appendChild(label);
});
function selectedTopics(){
  return [...topicList.querySelectorAll('input:checked')].map(i=>i.value);
}
function updateCount(){
  const n = QUESTIONS.filter(q=>selectedTopics().includes(q.topic)).length;
  el('countInfo').textContent = n + ' Fragen ausgewählt';
}
topicList.addEventListener('change', updateCount);
updateCount();

el('allBtn').onclick = ()=>{
  topicList.querySelectorAll('input').forEach(i=>i.checked=true); updateCount();
};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

el('startBtn').onclick = ()=>{
  playerName = el('playerName').value.trim();
  if(!playerName){ alert('Bitte zuerst deinen Namen eingeben.'); el('playerName').focus(); return; }
  const sel = selectedTopics();
  if(sel.length===0){alert('Bitte mindestens ein Thema auswählen.');return;}
  pool = QUESTIONS.filter(q=>sel.includes(q.topic));
  if(el('shuffleQ').checked) pool = shuffle([...pool]);
  if(el('limit15').checked) pool = pool.slice(0,15);
  idx=0; score=0; answered=false; perTopic={};
  sel.forEach(t=>perTopic[t]={c:0,t:0});
  el('start').classList.add('hidden');
  el('result').classList.add('hidden');
  el('quiz').classList.remove('hidden');
  renderQuestion();
};

function renderQuestion(){
  answered=false;
  const q = pool[idx];
  el('qCounter').textContent = `Frage ${idx+1} / ${pool.length}`;
  el('qTopic').textContent = q.topic;
  el('qTag').textContent = q.type==='mc' ? 'Multiple Choice' : 'Eingabe';
  el('qText').textContent = q.q;
  el('bar').style.width = ((idx)/pool.length*100)+'%';
  el('feedback').className='feedback';
  el('feedback').innerHTML='';
  el('nextBtn').disabled=true;
  el('nextBtn').textContent = (idx===pool.length-1)?'Ergebnis anzeigen':'Weiter';
  const area = el('answerArea');
  area.innerHTML='';

  if(q.type==='mc'){
    q.options.forEach((opt,i)=>{
      const b=document.createElement('button');
      b.className='answer'; b.textContent=opt;
      b.onclick=()=>checkMC(i,b);
      area.appendChild(b);
    });
  } else {
    const inp=document.createElement('input');
    inp.className='text-ans'; inp.type='text';
    inp.placeholder='Antwort eingeben und Enter drücken …';
    inp.autocomplete='off';
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter' && !answered) checkText(inp); });
    area.appendChild(inp);
    const sb=document.createElement('button');
    sb.textContent='Prüfen'; sb.style.marginTop='12px';
    sb.onclick=()=>{ if(!answered) checkText(inp); };
    area.appendChild(sb);
    const hint=document.createElement('small');
    hint.className='hint'; hint.textContent='Tipp: Groß-/Kleinschreibung egal.';
    area.appendChild(hint);
    setTimeout(()=>inp.focus(),50);
  }
}

function recordTopic(q,correct){
  if(!perTopic[q.topic]) perTopic[q.topic]={c:0,t:0};
  perTopic[q.topic].t++; if(correct) perTopic[q.topic].c++;
}

function checkMC(i,btn){
  if(answered) return; answered=true;
  const q=pool[idx];
  const buttons=[...el('answerArea').querySelectorAll('.answer')];
  buttons.forEach(b=>{b.disabled=true; b.classList.add('disabled');});
  const correct = i===q.answer;
  buttons[q.answer].classList.add('correct');
  if(!correct) btn.classList.add('wrong');
  if(correct) score++;
  recordTopic(q,correct);
  showFeedback(correct,q);
}

function norm(s){
  return s.toLowerCase().trim()
    .replace(/[.,;!?]/g,'')
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
    .replace(/\s+/g,' ');
}
function checkText(inp){
  if(answered) return; answered=true;
  const q=pool[idx];
  const val=norm(inp.value);
  const correct = q.accept.some(a=>{
    const na=norm(a);
    return val===na || (val.length>2 && (val.includes(na)||na.includes(val)));
  });
  inp.disabled=true;
  inp.style.borderColor = correct ? 'var(--good)' : 'var(--bad)';
  if(correct) score++;
  recordTopic(q,correct);
  showFeedback(correct,q,q.accept[0]);
}

function showFeedback(correct,q,sol){
  const f=el('feedback');
  f.classList.add('show', correct?'ok':'no');
  let txt = correct ? '✅ Richtig! ' : '❌ Leider falsch. ';
  if(!correct && sol) txt += `Lösung: <b>${sol}</b>. `;
  txt += q.fb||'';
  f.innerHTML = txt;
  el('nextBtn').disabled=false;
  el('bar').style.width = ((idx+1)/pool.length*100)+'%';
}

el('nextBtn').onclick=()=>{
  if(idx<pool.length-1){ idx++; renderQuestion(); }
  else showResult();
};
el('quitBtn').onclick=()=>{ if(confirm('Quiz abbrechen?')) goHome(); };

async function showResult(){
  el('quiz').classList.add('hidden');
  el('result').classList.remove('hidden');
  const pct=Math.round(score/pool.length*100);
  el('scoreBig').textContent = `${score} ${score===1?'Punkt':'Punkte'}`;
  let msg;
  if(pct>=90) msg='🏆 Hervorragend! Sehr gut gelernt.';
  else if(pct>=75) msg='👍 Stark! Fast alles sitzt.';
  else if(pct>=50) msg='🙂 Solide – ein bisschen Wiederholung hilft.';
  else msg='📚 Dranbleiben – schau dir die Themen nochmal an.';
  el('scoreSub').textContent = `${score} / ${pool.length} richtig (${pct} %) · ${msg}`;
  const bd=el('breakdown'); bd.innerHTML='';
  Object.keys(perTopic).forEach(t=>{
    const p=perTopic[t]; if(p.t===0) return;
    const d=document.createElement('div');
    d.innerHTML=`<span>${t}</span><span>${p.c} / ${p.t}</span>`;
    bd.appendChild(d);
  });
  el('monthLabel').textContent = monthName();
  await updateBoard();
}

const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function updateBoard(){
  const status=el('boardStatus');
  const tb=el('board').querySelector('tbody');
  tb.innerHTML='';
  status.textContent = ONLINE ? 'Sende Ergebnis …' : '';
  try{
    await submitScore(playerName, score);
    let rows = await loadBoard();
    // bester Versuch pro Name behalten
    const best={};
    rows.forEach(r=>{ if(!(r.name in best) || r.points>best[r.name]) best[r.name]=r.points; });
    let board = Object.keys(best).map(n=>({name:n, points:best[n]}))
                  .sort((a,b)=>b.points-a.points).slice(0,15);
    const medals=['🥇','🥈','🥉'];
    let myShown=false;
    board.forEach((r,i)=>{
      const tr=document.createElement('tr');
      const isMe = !myShown && r.name===playerName && r.points===score;
      if(isMe){ tr.className='me'; myShown=true; }
      tr.innerHTML = `<td class="rank">${medals[i]||(i+1)}</td>`+
                     `<td>${esc(r.name)}${isMe?' <span class="pill">(du)</span>':''}</td>`+
                     `<td class="pts">${r.points}</td>`;
      tb.appendChild(tr);
    });
    if(board.length===0) tb.innerHTML='<tr><td class="center" style="color:var(--muted)">Noch keine Einträge.</td></tr>';
    status.textContent = ONLINE ? '🌐 Gemeinsame Online-Rangliste' : '💾 Lokale Rangliste (nur dieses Gerät – Online-Zugang noch nicht eingerichtet)';
  }catch(e){
    status.textContent = '⚠️ Rangliste konnte nicht geladen werden. Dein Ergebnis: '+score+' Punkte.';
  }
}
el('retryBtn').onclick=()=>el('startBtn').click();
el('homeBtn').onclick=goHome;
function goHome(){
  el('quiz').classList.add('hidden');
  el('result').classList.add('hidden');
  el('start').classList.remove('hidden');
}
</script>
